<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts App</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="loading-indicator" style="display:none;">⏳ Loading...</div>

    <div id="app-root"></div>

    <template id="tpl-login">
        <div class="page">
            <h1>Login</h1>
            <form id="login-form">
                <label>Username</label>
                <input type="text" id="login-username" required />
                <label>Password</label>
                <input type="password" id="login-password" required />
                <button type="submit" id="btn-login-submit">Login</button>
            </form>
            <p id="login-error" style="display:none; color: red;"></p>
            <p>No account? <a href="#" id="go-to-register">Register here</a></p>
        </div>
    </template>

    <template id="tpl-form">
        <div class="page">
            <h1 id="form-title">Add/Edit Contact</h1>
            <form id="contact-form">
                <input type="hidden" id="form-contact-id" />
                <label>Name</label>
                <input type="text" id="form-name" required />
                <label>Phone</label>
                <input type="tel" id="form-phone" />
                <label>Email (Optional)</label>
                <input type="email" id="form-email" />
                <label>Note (Optional)</label>
                <input type="text" id="form-note" />
                
                <div class="form-actions">
                    <button type="submit" id="btn-form-submit">💾 Save</button>
                    <button type="button" id="btn-cancel-form">Cancel</button>
                </div>
            </form>
            <p id="form-error" style="display:none; color: red;"></p>
        </div>
    </template>

    <template id="tpl-register">
        <div class="page">
            <h1>Register</h1>
            <form id="register-form">
                <label>Username</label>
                <input type="text" id="reg-username" required />
                <label>Email</label>
                <input type="email" id="reg-email" required />
                <label>Password</label>
                <input type="password" id="reg-password" required />
                <small class="password-help">* The password must contain at least 6 characters, and include at least one letter and one number</small>
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" required />
                <button type="submit" id="btn-reg-submit">Register</button>
            </form>
            <p id="register-error" style="display:none; color: red;"></p>
            <p>Already have an account? <a href="#" id="go-to-login">Login here</a></p>
        </div>
    </template>

    <template id="tpl-list">
        <div class="page">
            <h1>My Contacts</h1>
            <div class="list-toolbar">
                <input type="text" id="search-input" placeholder="🔍 Search contacts..." />
                <button id="btn-add-contact">+ Add Contact</button>
                <button id="btn-logout">Logout</button>
            </div>
            <p id="list-error" style="display:none; color: red;"></p>
            <div id="contacts-container"></div>
        </div>
    </template>

    <template id="tpl-detail">
        <div class="page">
            <h1>Contact Details</h1>
            <div class="detail-card">
                <p><strong>Name:</strong> <span id="detail-name"></span></p>
                <p><strong>Phone:</strong> <span id="detail-phone"></span></p>
                <p><strong>Email:</strong> <span id="detail-email"></span></p>
                <p><strong>Note:</strong> <span id="detail-note"></span></p>
            </div>
            <div class="detail-actions">
                <button id="btn-edit-contact">✏️ Edit</button>
                <button id="btn-delete-contact">🗑️ Delete</button>
                <button id="btn-back-to-list">← Back</button>
            </div>
            <p id="detail-error" style="display:none; color: red;"></p>
        </div>
    </template>
    <script src="js/communication/Network.js"></script>
    <script src="js/communication/FAJAX.js"></script>
    <script src="js/db/UsersDB.js"></script>
    <script src="js/db/DataDB.js"></script>
    <script src="js/server/AuthServer.js"></script>
    <script src="js/server/DataServer.js"></script>
    <script src="js/client/App.js"></script>
    <script src="js/client/Router.js"></script>
    <script src="js/client/LoginView.js"></script>
    <script src="js/client/RegisterView.js"></script>
    <script src="js/client/ListView.js"></script>
    <script src="js/client/DetailView.js"></script>
    <script src="js/client/FormView.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
